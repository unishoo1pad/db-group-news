name: 뉴스 자동 수집

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 오전 9시 KST (= UTC 00:00)
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: 뉴스 수집 실행
        id: fetch
        run: python scripts/fetch_news.py
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY:   ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET:  ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN:  ${{ secrets.KAKAO_REFRESH_TOKEN }}

      - name: 뉴스 수집 재시도 (실패 시)
        if: failure() && steps.fetch.outcome == 'failure'
        run: |
          echo "첫 번째 시도 실패 — 30초 후 재시도"
          sleep 30
          python scripts/fetch_news.py
        env:
          NAVER_CLIENT_ID:     ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KAKAO_REST_API_KEY:   ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET:  ${{ secrets.KAKAO_CLIENT_SECRET }}
          KAKAO_REFRESH_TOKEN:  ${{ secrets.KAKAO_REFRESH_TOKEN }}

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/news-data.js
          if git diff --staged --quiet; then
            echo "새로운 기사 없음 — 커밋 건너뜀"
          else
            git commit -m "뉴스 자동 업데이트: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')"
            git push
          fi
