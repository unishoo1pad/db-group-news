name: Test Dooray Messenger

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Dooray
        run: |
          curl -s -X POST "${{ secrets.DOORAY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "botName": "DB뉴스봇",
              "text": "💚 DB그룹 뉴스 업데이트 완료!\n\n📅 2026.06.21\n🔄 금일 추가: 12건\n📊 총 기사: 345건\n\n🔗 https://db-group-news.vercel.app\n🔗 https://dbnews.unishoo1.xyz"
            }'
