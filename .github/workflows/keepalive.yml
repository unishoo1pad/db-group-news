name: Keep Alive

on:
  schedule:
    - cron: '0 12 * * 0'  # 매주 일요일 오후 9시 KST (= UTC 12:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 저장소 활성 상태 유지
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep workflows active [$(TZ=Asia/Seoul date '+%Y-%m-%d')]"
          git push
